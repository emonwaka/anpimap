    <path d="M58 150 C 170 108 300 240 462 188" fill="none" stroke="#cad3de" stroke-width="22" stroke-linecap="round"/>
    <path d="M252 38 C 216 150 300 250 198 382" fill="none" stroke="#dbe2ea" stroke-width="15" stroke-linecap="round"/>
